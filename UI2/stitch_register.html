<style>

</div>

<!-- Email -->

<div class="relative">

<span class="material-symbols-outlined" data-icon="visibility">visibility</span>

</div>
<p class="mt-sm font-label-sm text-label-sm text-on-surface-variant flex items-start gap-xs">
<span class="material-symbols-outlined text-[16px] mt-[2px]" data-icon="info">info</span>

<!-- Visual Polish: Petal Animation -->
<script>
        function createPetal() {
            const container = document.getElementById('petal-container');
            if (!container) return;
            
            const petal = document.createElement('div');
            petal.classList.add('petal');
            
            const size = Math.random() * 10 + 10;
            const startX = Math.random() * window.innerWidth;
            const duration = Math.random() * 5 + 10;
            const delay = Math.random() * 5;
            
            petal.style.width = `${size}px`;
            petal.style.height = `${size * 0.8}px`;
            petal.style.left = `${startX}px`;
            petal.style.animationDuration = `${duration}s`;
            petal.style.animationDelay = `${delay}s`;
            
            container.appendChild(petal);
            
            setTimeout(() => {
                petal.remove();
            }, (duration + delay) * 1000);
        }

        // Initialize background petals
        for(let i = 0; i < 15; i++) {
            createPetal();
        }
        setInterval(createPetal, 1500);
    </script>
