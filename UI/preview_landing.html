<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SumaryJP - Trang chủ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'Noto Sans JP', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#fdf2f8', 100: '#fce7f3', 400: '#f472b6', 500: '#ec4899', 600: '#db2777', 700: '#be185d' },
                        secondary: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 30px -10px rgba(236, 72, 153, 0.1); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5); }
        body { background: linear-gradient(-45deg, #fce7f3, #e0f2fe, #fdf2f8, #f0f9ff); background-size: 400% 400%; animation: gradientBG 20s ease infinite; }
        .dark body { background: linear-gradient(-45deg, #4a044e, #082f49, #831843, #0f172a); background-size: 400% 400%; animation: gradientBG 20s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-100 transition-colors duration-700 min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="glass-panel sticky top-0 z-40 px-8 py-5 flex justify-between items-center border-b border-white/50 dark:border-white/10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-400 to-secondary-500 flex items-center justify-center shadow-lg text-white font-bold text-xl">S</div>
            <span class="text-2xl font-bold tracking-tight">SumaryJP</span>
        </div>
        <div class="flex items-center gap-6">
            <a href="#" class="font-medium hover:text-primary-500 transition-colors hidden sm:block">Tính năng</a>
            <a href="#" class="font-medium hover:text-primary-500 transition-colors hidden sm:block">Đánh giá</a>
            <button class="px-6 py-2.5 rounded-full bg-primary-500 text-white font-bold shadow-lg hover:shadow-primary-500/30 hover:-translate-y-0.5 transition-all">Đăng Nhập</button>
        </div>
    </nav>

    <!-- Hero Section -->
    <main class="flex-grow flex flex-col items-center justify-center p-6 text-center max-w-5xl mx-auto py-20 relative">
        <div class="absolute -top-20 -left-20 w-64 h-64 bg-secondary-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob dark:opacity-20"></div>
        <div class="absolute top-0 right-0 w-64 h-64 bg-primary-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000 dark:opacity-20"></div>
        
        <div class="relative z-10">
            <span class="px-4 py-2 rounded-full bg-white/60 dark:bg-black/30 border border-primary-200 dark:border-primary-800 text-primary-600 dark:text-primary-400 font-bold text-sm mb-6 inline-block shadow-sm">Nền tảng học tiếng Nhật thông minh 🚀</span>
            <h1 class="text-5xl md:text-7xl font-extrabold mb-6 leading-tight tracking-tight">
                Chinh phục từ vựng <br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary-500 to-secondary-500">Dễ dàng hơn bao giờ hết</span>
            </h1>
            <p class="text-xl text-gray-600 dark:text-gray-300 mb-10 max-w-2xl mx-auto font-medium">
                Phương pháp lặp lại ngắt quãng (SRS) kết hợp flashcard 3D giúp bạn nhớ từ vựng JLPT nhanh gấp 3 lần.
            </p>
            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <button class="w-full sm:w-auto px-8 py-4 bg-gradient-to-r from-primary-500 to-secondary-500 hover:from-primary-600 hover:to-secondary-600 text-white rounded-full font-bold text-lg shadow-xl shadow-primary-500/25 hover:shadow-primary-500/40 transform hover:-translate-y-1 transition-all">
                    Bắt đầu học miễn phí
                </button>
            </div>
        </div>
        
        <!-- Mockup Visual -->
        <div class="mt-16 w-full max-w-4xl relative z-10 perspective-1000">
            <div class="glass-panel p-4 rounded-3xl shadow-2xl transform rotate-x-12 scale-95 border-4 border-white/40 dark:border-white/10 hover:rotate-x-0 transition-transform duration-700">
                <div class="w-full h-[400px] bg-white/50 dark:bg-black/50 rounded-2xl flex items-center justify-center flex-col">
                    <span class="text-6xl mb-4">🖥️</span>
                    <span class="text-lg font-bold text-gray-500">App Preview Image Here</span>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
