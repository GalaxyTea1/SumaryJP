<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SumaryJP - Bảng Xếp Hạng</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#fdf2f8', 100: '#fce7f3', 400: '#f472b6', 500: '#ec4899', 600: '#db2777' },
                        secondary: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' },
                        gold: '#FBBF24', silver: '#94A3B8', bronze: '#B45309'
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 30px -10px rgba(236, 72, 153, 0.1); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5); }
        body { background: linear-gradient(-45deg, #fce7f3, #e0f2fe, #fdf2f8, #f0f9ff); background-size: 400% 400%; animation: gradientBG 20s ease infinite; }
        .dark body { background: linear-gradient(-45deg, #4a044e, #082f49, #831843, #0f172a); background-size: 400% 400%; animation: gradientBG 20s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-100 min-h-screen pb-12 transition-colors duration-700">
    <nav class="glass-panel sticky top-0 z-40 px-6 py-4 flex justify-between items-center border-b border-white/50 dark:border-white/10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-400 to-secondary-500 flex items-center justify-center shadow-lg text-white font-bold text-xl">S</div>
            <span class="text-xl font-bold tracking-tight">SumaryJP</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 pt-10">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold mb-3">Bảng Vàng Danh Dự 🏆</h1>
            <p class="text-gray-600 dark:text-gray-400 font-medium">Những học viên chăm chỉ nhất tuần này</p>
        </div>

        <!-- Podium -->
        <div class="flex justify-center items-end gap-4 mb-12 h-64">
            <!-- Rank 2 -->
            <div class="w-1/3 max-w-[150px] flex flex-col items-center group">
                <img src="https://i.pravatar.cc/150?img=12" class="w-16 h-16 rounded-full border-4 border-silver mb-3 z-10 shadow-lg group-hover:-translate-y-2 transition-transform">
                <div class="w-full h-32 bg-gradient-to-t from-silver to-slate-200 dark:from-slate-700 dark:to-slate-600 rounded-t-2xl flex justify-center pt-4 relative overflow-hidden shadow-lg border border-white/30">
                    <span class="text-3xl font-black text-white/50">2</span>
                </div>
                <span class="font-bold mt-3">Maria</span>
                <span class="text-xs text-primary-600 dark:text-primary-400 font-bold">1,240 điểm</span>
            </div>
            <!-- Rank 1 -->
            <div class="w-1/3 max-w-[150px] flex flex-col items-center group">
                <div class="text-3xl mb-1 animate-bounce">👑</div>
                <img src="https://i.pravatar.cc/150?img=32" class="w-20 h-20 rounded-full border-4 border-gold mb-3 z-10 shadow-xl group-hover:-translate-y-2 transition-transform">
                <div class="w-full h-40 bg-gradient-to-t from-gold to-yellow-200 dark:from-yellow-700 dark:to-yellow-500 rounded-t-2xl flex justify-center pt-4 relative overflow-hidden shadow-lg border border-white/30">
                    <span class="text-4xl font-black text-white/50">1</span>
                </div>
                <span class="font-bold mt-3">Kenji San</span>
                <span class="text-xs text-primary-600 dark:text-primary-400 font-bold">1,500 điểm</span>
            </div>
            <!-- Rank 3 -->
            <div class="w-1/3 max-w-[150px] flex flex-col items-center group">
                <img src="https://i.pravatar.cc/150?img=5" class="w-16 h-16 rounded-full border-4 border-bronze mb-3 z-10 shadow-lg group-hover:-translate-y-2 transition-transform">
                <div class="w-full h-24 bg-gradient-to-t from-bronze to-orange-200 dark:from-orange-800 dark:to-orange-700 rounded-t-2xl flex justify-center pt-4 relative overflow-hidden shadow-lg border border-white/30">
                    <span class="text-3xl font-black text-white/50">3</span>
                </div>
                <span class="font-bold mt-3">Alex</span>
                <span class="text-xs text-primary-600 dark:text-primary-400 font-bold">1,100 điểm</span>
            </div>
        </div>

        <!-- List -->
        <div class="glass-panel rounded-3xl p-6 shadow-sm">
            <div class="space-y-3">
                <!-- User 4 -->
                <div class="flex items-center justify-between p-4 rounded-2xl bg-white/40 dark:bg-white/5 hover:bg-white/60 dark:hover:bg-white/10 transition-colors">
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-gray-500 w-6 text-center">4</span>
                        <img src="https://i.pravatar.cc/150?img=1" class="w-10 h-10 rounded-full shadow-sm">
                        <span class="font-bold">Sakura</span>
                    </div>
                    <span class="font-bold text-primary-500">980 điểm</span>
                </div>
                <!-- User 5 -->
                <div class="flex items-center justify-between p-4 rounded-2xl bg-white/40 dark:bg-white/5 hover:bg-white/60 dark:hover:bg-white/10 transition-colors">
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-gray-500 w-6 text-center">5</span>
                        <img src="https://i.pravatar.cc/150?img=11" class="w-10 h-10 rounded-full shadow-sm">
                        <span class="font-bold">John Doe</span>
                    </div>
                    <span class="font-bold text-primary-500">850 điểm</span>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
