<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SumaryJP - Bài Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'Noto Sans JP', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#fdf2f8', 100: '#fce7f3', 400: '#f472b6', 500: '#ec4899', 600: '#db2777', 700: '#be185d' },
                        secondary: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 30px -10px rgba(236, 72, 153, 0.1); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5); }
        body { background: linear-gradient(-45deg, #fce7f3, #e0f2fe, #fdf2f8, #f0f9ff); background-size: 400% 400%; animation: gradientBG 20s ease infinite; }
        .dark body { background: linear-gradient(-45deg, #4a044e, #082f49, #831843, #0f172a); background-size: 400% 400%; animation: gradientBG 20s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-100 transition-colors duration-700 min-h-screen flex flex-col">
    <!-- Navbar / Header -->
    <nav class="glass-panel sticky top-0 z-40 px-6 py-4 flex justify-between items-center border-b border-white/50 dark:border-white/10">
        <div class="flex items-center gap-4">
            <span class="text-lg font-bold text-gray-500">Bài Test N3</span>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex flex-col items-end">
                <span class="text-2xl font-bold text-primary-500 font-mono">14:59</span>
                <span class="text-xs text-gray-500 dark:text-gray-400">Thời gian còn lại</span>
            </div>
            <button class="px-5 py-2.5 bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400 rounded-xl font-bold hover:bg-red-200 dark:hover:bg-red-900/50 transition-colors">Nộp bài</button>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6 w-full max-w-3xl mx-auto">
        <div class="w-full glass-panel rounded-3xl p-8 shadow-xl">
            <!-- Progress indicator -->
            <div class="flex justify-between items-center mb-6">
                <span class="font-bold text-lg">Câu hỏi 5 / 20</span>
                <div class="w-1/2 bg-white/50 dark:bg-black/30 rounded-full h-2 border border-gray-200 dark:border-gray-700">
                    <div class="bg-gradient-to-r from-primary-500 to-secondary-500 h-full rounded-full transition-all" style="width: 25%"></div>
                </div>
            </div>

            <!-- Question -->
            <div class="mb-10 text-center py-8 border-y border-white/40 dark:border-white/10">
                <p class="text-lg text-gray-500 dark:text-gray-400 mb-4">Chọn nghĩa đúng của từ sau:</p>
                <h2 class="text-5xl font-bold text-gray-900 dark:text-white font-['Noto_Sans_JP']">勉強</h2>
            </div>

            <!-- Options -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <button class="p-5 rounded-2xl bg-white/50 dark:bg-black/20 border-2 border-transparent hover:border-primary-400 text-left font-medium transition-all shadow-sm">
                    A. Làm việc
                </button>
                <button class="p-5 rounded-2xl bg-primary-50 dark:bg-primary-900/20 border-2 border-primary-500 text-left font-medium transition-all shadow-sm flex justify-between items-center text-primary-700 dark:text-primary-300">
                    <span>B. Học tập</span>
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </button>
                <button class="p-5 rounded-2xl bg-white/50 dark:bg-black/20 border-2 border-transparent hover:border-primary-400 text-left font-medium transition-all shadow-sm">
                    C. Ngủ
                </button>
                <button class="p-5 rounded-2xl bg-white/50 dark:bg-black/20 border-2 border-transparent hover:border-primary-400 text-left font-medium transition-all shadow-sm">
                    D. Du lịch
                </button>
            </div>

            <!-- Navigation -->
            <div class="flex justify-between mt-8 pt-4">
                <button class="px-6 py-3 rounded-xl bg-white/50 dark:bg-black/30 font-semibold hover:bg-white/80 dark:hover:bg-black/50 transition-colors shadow-sm">Quay lại</button>
                <button class="px-8 py-3 rounded-xl bg-gradient-to-r from-primary-500 to-secondary-500 text-white font-bold hover:opacity-90 shadow-lg hover:shadow-xl transition-all hover:-translate-y-0.5">Tiếp theo</button>
            </div>
        </div>
    </main>
</body>
</html>
