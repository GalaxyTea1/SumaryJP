<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SumaryJP - Bảng chữ cái</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'Noto Sans JP', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#fdf2f8', 100: '#fce7f3', 400: '#f472b6', 500: '#ec4899', 600: '#db2777', 700: '#be185d' },
                        secondary: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 30px -10px rgba(236, 72, 153, 0.1); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5); }
        body { background: linear-gradient(-45deg, #fce7f3, #e0f2fe, #fdf2f8, #f0f9ff); background-size: 400% 400%; animation: gradientBG 20s ease infinite; }
        .dark body { background: linear-gradient(-45deg, #4a044e, #082f49, #831843, #0f172a); background-size: 400% 400%; animation: gradientBG 20s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-100 transition-colors duration-700 min-h-screen">
    <!-- Navbar -->
    <nav class="glass-panel sticky top-0 z-40 px-6 py-4 flex justify-between items-center border-b border-white/50 dark:border-white/10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-400 to-secondary-500 flex items-center justify-center shadow-lg text-white font-bold text-xl">S</div>
            <span class="text-xl font-bold tracking-tight">SumaryJP</span>
        </div>
        <button id="themeToggle" class="p-2 rounded-full hover:bg-white/50 dark:hover:bg-black/20 transition-colors">
            <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
    </nav>

    <div class="max-w-6xl mx-auto px-6 py-8">
        <h1 class="text-3xl font-bold mb-6">Bảng chữ cái & Kanji</h1>
        
        <!-- Tabs -->
        <div class="flex gap-4 mb-8">
            <button class="px-6 py-2.5 rounded-full bg-primary-500 text-white font-semibold shadow-md">Hiragana</button>
            <button class="px-6 py-2.5 rounded-full bg-white/50 dark:bg-black/20 hover:bg-white/80 font-semibold transition-colors">Katakana</button>
            <button class="px-6 py-2.5 rounded-full bg-white/50 dark:bg-black/20 hover:bg-white/80 font-semibold transition-colors">Kanji (N5)</button>
        </div>

        <!-- Grid -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
            <!-- A -->
            <div class="glass-panel p-6 rounded-2xl flex flex-col items-center justify-center hover:-translate-y-1 transition-transform cursor-pointer group border-2 border-transparent hover:border-primary-400">
                <span class="text-4xl font-bold text-gray-900 dark:text-white mb-2 group-hover:text-primary-500 transition-colors font-['Noto_Sans_JP']">あ</span>
                <span class="text-sm font-medium text-gray-500 dark:text-gray-400">a</span>
            </div>
            <!-- I -->
            <div class="glass-panel p-6 rounded-2xl flex flex-col items-center justify-center hover:-translate-y-1 transition-transform cursor-pointer group border-2 border-transparent hover:border-primary-400">
                <span class="text-4xl font-bold text-gray-900 dark:text-white mb-2 group-hover:text-primary-500 transition-colors font-['Noto_Sans_JP']">い</span>
                <span class="text-sm font-medium text-gray-500 dark:text-gray-400">i</span>
            </div>
            <!-- U -->
            <div class="glass-panel p-6 rounded-2xl flex flex-col items-center justify-center hover:-translate-y-1 transition-transform cursor-pointer group border-2 border-transparent hover:border-primary-400">
                <span class="text-4xl font-bold text-gray-900 dark:text-white mb-2 group-hover:text-primary-500 transition-colors font-['Noto_Sans_JP']">う</span>
                <span class="text-sm font-medium text-gray-500 dark:text-gray-400">u</span>
            </div>
            <!-- E -->
            <div class="glass-panel p-6 rounded-2xl flex flex-col items-center justify-center hover:-translate-y-1 transition-transform cursor-pointer group border-2 border-transparent hover:border-primary-400">
                <span class="text-4xl font-bold text-gray-900 dark:text-white mb-2 group-hover:text-primary-500 transition-colors font-['Noto_Sans_JP']">え</span>
                <span class="text-sm font-medium text-gray-500 dark:text-gray-400">e</span>
            </div>
            <!-- O -->
            <div class="glass-panel p-6 rounded-2xl flex flex-col items-center justify-center hover:-translate-y-1 transition-transform cursor-pointer group border-2 border-transparent hover:border-primary-400">
                <span class="text-4xl font-bold text-gray-900 dark:text-white mb-2 group-hover:text-primary-500 transition-colors font-['Noto_Sans_JP']">お</span>
                <span class="text-sm font-medium text-gray-500 dark:text-gray-400">o</span>
            </div>
        </div>
    </div>
    <script>
        const toggleBtn = document.getElementById('themeToggle');
        const html = document.documentElement;
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            html.classList.add('dark');
        }
        toggleBtn.addEventListener('click', () => html.classList.toggle('dark'));
    </script>
</body>
</html>
