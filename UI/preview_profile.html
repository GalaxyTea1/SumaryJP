<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SumaryJP - Cài Đặt Cá Nhân</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#fdf2f8', 100: '#fce7f3', 400: '#f472b6', 500: '#ec4899', 600: '#db2777' },
                        secondary: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 30px -10px rgba(236, 72, 153, 0.1); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5); }
        body { background: linear-gradient(-45deg, #fce7f3, #e0f2fe, #fdf2f8, #f0f9ff); background-size: 400% 400%; animation: gradientBG 20s ease infinite; }
        .dark body { background: linear-gradient(-45deg, #4a044e, #082f49, #831843, #0f172a); background-size: 400% 400%; animation: gradientBG 20s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-100 min-h-screen transition-colors duration-700">
    <nav class="glass-panel sticky top-0 z-40 px-6 py-4 flex justify-between items-center border-b border-white/50 dark:border-white/10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-400 to-secondary-500 flex items-center justify-center shadow-lg text-white font-bold text-xl">S</div>
            <span class="text-xl font-bold tracking-tight">SumaryJP</span>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-6 py-10">
        <h1 class="text-3xl font-bold mb-8">Cài đặt cá nhân</h1>
        
        <div class="glass-panel rounded-3xl p-8 mb-6 shadow-sm">
            <div class="flex flex-col sm:flex-row items-center gap-6 mb-8 pb-8 border-b border-white/40 dark:border-gray-700">
                <img src="https://i.pravatar.cc/150?img=32" class="w-24 h-24 rounded-full border-4 border-white dark:border-gray-800 shadow-lg">
                <div class="text-center sm:text-left">
                    <h2 class="text-2xl font-bold">Kenji San</h2>
                    <p class="text-gray-500 dark:text-gray-400 mb-3 font-medium">kenji@example.com</p>
                    <button class="px-5 py-2.5 rounded-xl bg-white/60 dark:bg-black/30 border border-gray-200 dark:border-gray-700 font-semibold text-sm hover:bg-white/80 dark:hover:bg-black/50 transition-colors shadow-sm">Đổi ảnh đại diện</button>
                </div>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold mb-2">Mục tiêu học tập hằng ngày</label>
                    <select class="w-full p-4 rounded-xl bg-white/60 dark:bg-black/30 border border-gray-200 dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-primary-500 font-medium cursor-pointer shadow-sm">
                        <option>Thong thả (10 từ/ngày)</option>
                        <option selected>Tiêu chuẩn (20 từ/ngày)</option>
                        <option>Nghiêm túc (50 từ/ngày)</option>
                    </select>
                </div>
                
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between p-5 rounded-2xl bg-white/50 dark:bg-white/5 border border-transparent hover:border-gray-200 dark:hover:border-gray-700 transition-colors gap-4 shadow-sm">
                    <div>
                        <div class="font-bold text-gray-900 dark:text-white">Nhắc nhở học tập qua Email</div>
                        <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">Nhận email nhắc nhở vào lúc 8:00 tối hằng ngày</div>
                    </div>
                    <!-- Toggle Switch -->
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" class="sr-only peer" checked>
                        <div class="w-14 h-7 bg-gray-300 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all dark:border-gray-600 peer-checked:bg-primary-500 shadow-inner"></div>
                    </label>
                </div>
                
                <button class="w-full py-4 mt-6 bg-gradient-to-r from-primary-500 to-secondary-500 text-white rounded-2xl font-bold text-lg shadow-lg shadow-primary-500/25 hover:shadow-primary-500/40 hover:-translate-y-1 transition-all">
                    Lưu thay đổi
                </button>
            </div>
        </div>
    </main>
</body>
</html>
