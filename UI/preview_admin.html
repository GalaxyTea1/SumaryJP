<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SumaryJP - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'Noto Sans JP', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#fdf2f8', 100: '#fce7f3', 400: '#f472b6', 500: '#ec4899', 600: '#db2777', 700: '#be185d' },
                        secondary: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 30px -10px rgba(236, 72, 153, 0.1); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5); }
        body { background: linear-gradient(-45deg, #fce7f3, #e0f2fe, #fdf2f8, #f0f9ff); background-size: 400% 400%; animation: gradientBG 20s ease infinite; }
        .dark body { background: linear-gradient(-45deg, #4a044e, #082f49, #831843, #0f172a); background-size: 400% 400%; animation: gradientBG 20s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-100 transition-colors duration-700 min-h-screen flex">
    
    <!-- Sidebar -->
    <aside class="w-64 glass-panel border-r border-white/50 dark:border-white/10 flex flex-col hidden md:flex min-h-screen rounded-none z-10 relative">
        <div class="p-6 border-b border-white/40 dark:border-white/10 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary-400 to-secondary-500 flex items-center justify-center text-white font-bold">S</div>
            <span class="font-bold text-lg tracking-tight">Admin Panel</span>
        </div>
        <div class="p-4 flex-grow space-y-2">
            <a href="#" class="block px-4 py-3 rounded-xl bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400 font-bold border border-primary-200 dark:border-primary-800 shadow-sm">Quản lý Từ vựng</a>
            <a href="#" class="block px-4 py-3 rounded-xl hover:bg-white/50 dark:hover:bg-black/20 font-medium transition-colors">Quản lý Bài Test</a>
            <a href="#" class="block px-4 py-3 rounded-xl hover:bg-white/50 dark:hover:bg-black/20 font-medium transition-colors">Người dùng</a>
            <a href="#" class="block px-4 py-3 rounded-xl hover:bg-white/50 dark:hover:bg-black/20 font-medium transition-colors">Cài đặt</a>
        </div>
    </aside>

    <!-- Main Admin Content -->
    <main class="flex-grow flex flex-col h-screen overflow-hidden">
        
        <!-- Top Header -->
        <header class="glass-panel rounded-none px-8 py-5 flex justify-between items-center border-b border-white/50 dark:border-white/10 z-0">
            <h1 class="text-2xl font-bold">Quản lý Từ vựng</h1>
            <div class="flex items-center gap-4">
                <button id="themeToggle" class="p-2 rounded-full hover:bg-white/50 dark:hover:bg-black/20 transition-colors">
                    <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
            </div>
        </header>

        <!-- Content Area -->
        <div class="p-8 overflow-y-auto">
            <!-- Toolbar -->
            <div class="flex justify-between items-center mb-6">
                <div class="relative w-72">
                    <input type="text" placeholder="Tìm kiếm từ vựng..." class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-white/60 dark:bg-black/30 border border-white/50 dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-primary-500 shadow-sm">
                    <svg class="w-5 h-5 absolute left-3 top-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <button class="px-5 py-2.5 bg-gradient-to-r from-primary-500 to-secondary-500 text-white font-bold rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Thêm từ mới
                </button>
            </div>

            <!-- Table -->
            <div class="glass-panel rounded-2xl overflow-hidden shadow-sm">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white/40 dark:bg-black/30 border-b border-white/50 dark:border-white/10 text-sm font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider">
                            <th class="p-4 pl-6">Từ vựng</th>
                            <th class="p-4">Hiragana</th>
                            <th class="p-4">Nghĩa</th>
                            <th class="p-4">Cấp độ</th>
                            <th class="p-4 text-right pr-6">Hành động</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-white/40 dark:divide-white/10">
                        <tr class="hover:bg-white/60 dark:hover:bg-white/5 transition-colors group">
                            <td class="p-4 pl-6 font-bold text-lg font-['Noto_Sans_JP']">食べる</td>
                            <td class="p-4 text-gray-500 dark:text-gray-400 font-['Noto_Sans_JP']">たべる</td>
                            <td class="p-4 font-medium">Ăn</td>
                            <td class="p-4"><span class="px-2 py-1 bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 rounded-md text-xs font-bold border border-green-200 dark:border-green-800">N5</span></td>
                            <td class="p-4 text-right pr-6">
                                <button class="text-blue-500 hover:text-blue-700 mr-3 font-medium">Sửa</button>
                                <button class="text-red-500 hover:text-red-700 font-medium">Xóa</button>
                            </td>
                        </tr>
                        <tr class="hover:bg-white/60 dark:hover:bg-white/5 transition-colors group">
                            <td class="p-4 pl-6 font-bold text-lg font-['Noto_Sans_JP']">飲む</td>
                            <td class="p-4 text-gray-500 dark:text-gray-400 font-['Noto_Sans_JP']">のむ</td>
                            <td class="p-4 font-medium">Uống</td>
                            <td class="p-4"><span class="px-2 py-1 bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 rounded-md text-xs font-bold border border-green-200 dark:border-green-800">N5</span></td>
                            <td class="p-4 text-right pr-6">
                                <button class="text-blue-500 hover:text-blue-700 mr-3 font-medium">Sửa</button>
                                <button class="text-red-500 hover:text-red-700 font-medium">Xóa</button>
                            </td>
                        </tr>
                        <tr class="hover:bg-white/60 dark:hover:bg-white/5 transition-colors group">
                            <td class="p-4 pl-6 font-bold text-lg font-['Noto_Sans_JP']">勉強</td>
                            <td class="p-4 text-gray-500 dark:text-gray-400 font-['Noto_Sans_JP']">べんきょう</td>
                            <td class="p-4 font-medium">Học tập</td>
                            <td class="p-4"><span class="px-2 py-1 bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-400 rounded-md text-xs font-bold border border-yellow-200 dark:border-yellow-800">N4</span></td>
                            <td class="p-4 text-right pr-6">
                                <button class="text-blue-500 hover:text-blue-700 mr-3 font-medium">Sửa</button>
                                <button class="text-red-500 hover:text-red-700 font-medium">Xóa</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="flex justify-between items-center mt-6">
                <span class="text-sm text-gray-500 dark:text-gray-400 font-medium">Hiển thị 1 - 3 trong 145 từ</span>
                <div class="flex gap-2">
                    <button class="px-3 py-1 rounded-lg border border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-black/20 opacity-50 cursor-not-allowed font-medium text-sm">Trước</button>
                    <button class="px-3 py-1 rounded-lg bg-primary-500 text-white font-bold shadow-sm text-sm">1</button>
                    <button class="px-3 py-1 rounded-lg border border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-black/20 hover:bg-white/80 transition-colors font-medium text-sm">2</button>
                    <button class="px-3 py-1 rounded-lg border border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-black/20 hover:bg-white/80 transition-colors font-medium text-sm">Tiếp</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const toggleBtn = document.getElementById('themeToggle');
        const html = document.documentElement;
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            html.classList.add('dark');
        }
        toggleBtn.addEventListener('click', () => html.classList.toggle('dark'));
    </script>
</body>
</html>
