<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Review - Japanese Learning</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />

  <script type="module" src="./components/review.js"></script>

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#6366f1",
            "off-white": "#f8fafc",
            "sky-blue": "#0ea5e9",
            "gold": "#eab308",
            "emerald": "#10b981",
            "soft-purple": "#8b5cf6",
            "vibrant-orange": "#f97316"
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "3xl": "2.5rem"
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .glass-panel {
        @apply bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl border border-white dark:border-slate-700 shadow-2xl rounded-3xl p-8;
      }
      .btn-primary {
        @apply bg-indigo-600 text-white font-bold py-3 px-6 rounded-2xl shadow-lg shadow-indigo-200 dark:shadow-indigo-900/50 hover:bg-indigo-700 hover:shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2;
      }
    }
    
    /* Shake animation for incorrect answer */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .shake-anim {
      animation: shake 0.3s ease-in-out;
    }
  </style>
  <style>
    body {
      background-color: #f8fafc;
      background-image: radial-gradient(circle at top right, #e0e7ff 0%, transparent 40%), radial-gradient(circle at bottom left, #dbeafe 0%, transparent 40%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    html.dark body {
      background-color: #0f172a;
      background-image: radial-gradient(circle at top right, #1e1b4b 0%, transparent 40%), radial-gradient(circle at bottom left, #172554 0%, transparent 40%);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    html.dark ::-webkit-scrollbar-track {
      background: transparent;
    }

    html.dark ::-webkit-scrollbar-thumb {
      background: #334155;
    }

    html.dark ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
  </style>
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>

<body
  class="font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden transition-colors duration-300">

  <!-- Header Navbar -->
  <nav
    class="w-full px-6 py-4 flex items-center justify-between bg-white/50 dark:bg-slate-900/50 backdrop-blur-md border-b border-white/50 dark:border-slate-800/50 sticky top-0 z-50">
    <div class="flex items-center gap-4">
      <button id="exit-review"
        class="size-10 rounded-xl bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 shadow-sm border border-slate-200 dark:border-slate-700 flex items-center justify-center hover:text-rose-500 dark:hover:text-rose-400 hover:border-rose-200 dark:hover:border-rose-800/50 hover:bg-rose-50 dark:hover:bg-rose-900/30 transition-all">
        <span class="material-symbols-outlined font-bold">close</span>
      </button>
      <div>
        <h1 class="font-black text-xl text-slate-800 dark:text-white">Ôn tập (Spaced Repetition)</h1>
        <p class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mt-0.5"
          id="header-lesson-title">Đang rèn luyện trí nhớ</p>
      </div>
    </div>
    <div
      class="flex items-center gap-2 bg-indigo-50 dark:bg-indigo-900/30 px-4 py-2 rounded-xl border border-indigo-100/50 dark:border-indigo-800/50">
      <span class="material-symbols-outlined text-indigo-500 dark:text-indigo-400 text-xl">school</span>
      <span id="review-progress" class="font-extrabold text-indigo-700 dark:text-indigo-300 text-sm">Còn lại: 0</span>
    </div>
  </nav>

  <!-- Main Review Area -->
  <main class="flex-1 flex flex-col items-center justify-center p-6 w-full max-w-2xl mx-auto relative">

    <!-- Empty State / Done State -->
    <div id="empty-state" class="hidden text-center glass-panel">
      <div
        class="size-24 rounded-full bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center mx-auto mb-6">
        <span class="material-symbols-outlined text-5xl text-emerald-500 dark:text-emerald-400">task_alt</span>
      </div>
      <h2 class="text-3xl font-black text-slate-800 dark:text-white mb-2" id="empty-title">Tuyệt vời!</h2>
      <p class="text-slate-500 dark:text-slate-400 mb-8 max-w-sm mx-auto" id="empty-desc">Bạn không có từ nào cần ôn tập
        ngày hôm nay.</p>
      <button onclick="window.location.href='index.html'" class="btn-primary mx-auto w-full max-w-xs">
        <span class="material-symbols-outlined">home</span> Xong
      </button>
    </div>

    <!-- The Review Card -->
    <div id="review-container" class="w-full relative z-10 hidden">
      <div class="glass-panel text-center relative overflow-hidden group">

        <!-- Background decorative element -->
        <div class="absolute -top-12 -right-12 size-32 bg-indigo-100/50 dark:bg-indigo-900/30 rounded-full blur-2xl">
        </div>
        <div class="absolute -bottom-10 -left-10 size-24 bg-sky-100/50 dark:bg-sky-900/30 rounded-full blur-xl"></div>

        <div class="relative z-10">
          <h2 id="review-word"
            class="text-6xl sm:text-7xl font-black text-slate-900 dark:text-white mb-4 tracking-tighter">漢字</h2>
          <p id="review-hint" class="text-lg font-medium text-slate-500 dark:text-slate-400 mb-10 h-6">hiragana</p>

          <!-- Answer Input -->
          <div class="relative max-w-sm mx-auto">
            <input type="text" id="review-answer" autocomplete="off" placeholder="Nhập nghĩa tiếng Việt..."
              class="w-full h-14 px-6 rounded-2xl bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 dark:focus:ring-indigo-500/20 text-center font-bold text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 text-lg transition-all" />

            <!-- Result Feedback Badge -->
            <div id="review-result"
              class="absolute inset-x-0 -bottom-12 transform translate-y-4 opacity-0 transition-all font-bold text-sm py-2 px-4 rounded-xl text-center shadow-lg">
              <!-- Result goes here -->
            </div>
          </div>

          <div class="mt-8">
            <button id="submit-answer" class="btn-primary w-full max-w-sm mx-auto">
              Kiểm tra <span class="material-symbols-outlined">keyboard_return</span>
            </button>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- Global API Loading Overlay -->
  <div id="api-loading-overlay"
    class="fixed inset-0 z-[100] bg-slate-900/20 dark:bg-slate-900/60 backdrop-blur-sm flex items-center justify-center transition-all duration-300"
    style="display: none;">
    <div
      class="bg-white dark:bg-slate-800 p-5 rounded-3xl shadow-2xl border border-white/50 dark:border-slate-700/50 flex flex-col items-center gap-4">
      <div
        class="size-10 border-4 border-indigo-100 dark:border-indigo-900/50 border-t-indigo-600 dark:border-t-indigo-400 rounded-full animate-spin">
      </div>
      <p class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">Đang xử lý...</p>
    </div>
  </div>

</body>

</html>
