<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Flashcards - Japanese Learning</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />

  <script type="module" src="./components/flashcard.js"></script>

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#6366f1",
            "off-white": "#f8fafc",
            "sky-blue": "#0ea5e9",
            "gold": "#eab308",
            "emerald": "#10b981",
            "soft-purple": "#8b5cf6",
            "vibrant-orange": "#f97316"
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "3xl": "2.5rem"
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .glass-card {
        @apply bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl border border-white dark:border-slate-700 shadow-2xl;
      }
      .btn-primary {
        @apply bg-indigo-600 text-white font-bold py-3 px-6 rounded-2xl shadow-lg shadow-indigo-200 dark:shadow-indigo-900/50 hover:bg-indigo-700 hover:shadow-xl transition-all active:scale-95 flex items-center gap-2;
      }
      .btn-secondary {
        @apply bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-bold py-3 px-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 hover:border-indigo-300 dark:hover:border-indigo-500 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all active:scale-95 flex items-center gap-2;
      }
    }
    /* 3D Flip Styles */
    .perspective-1000 {
      perspective: 1000px;
    }
    .transform-style-3d {
      transform-style: preserve-3d;
    }
    .backface-hidden {
      backface-visibility: hidden;
    }
    .rotate-y-180 {
      transform: rotateY(180deg);
    }
  </style>
  <style>
    body {
      background-color: #f8fafc;
      background-image: radial-gradient(circle at top right, #e0e7ff 0%, transparent 40%), radial-gradient(circle at bottom left, #dbeafe 0%, transparent 40%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    html.dark body {
      background-color: #0f172a;
      background-image: radial-gradient(circle at top right, #1e1b4b 0%, transparent 40%), radial-gradient(circle at bottom left, #172554 0%, transparent 40%);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    html.dark ::-webkit-scrollbar-track {
      background: transparent;
    }

    html.dark ::-webkit-scrollbar-thumb {
      background: #334155;
    }

    html.dark ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
  </style>
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>

<body
  class="font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden transition-colors duration-300">

  <!-- Header Navbar -->
  <nav
    class="w-full px-6 py-4 flex items-center justify-between bg-white/50 dark:bg-slate-900/50 backdrop-blur-md border-b border-white/50 dark:border-slate-800/50 sticky top-0 z-50">
    <div class="flex items-center gap-4">
      <button id="exit-flashcard"
        class="size-10 rounded-xl bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 shadow-sm border border-slate-200 dark:border-slate-700 flex items-center justify-center hover:text-rose-500 dark:hover:text-rose-400 hover:border-rose-200 dark:hover:border-rose-800/50 hover:bg-rose-50 dark:hover:bg-rose-900/30 transition-all">
        <span class="material-symbols-outlined font-bold">close</span>
      </button>
      <div>
        <h1 class="font-black text-xl text-slate-800 dark:text-white" id="header-lesson-title">Flashcards</h1>
        <p class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mt-0.5">Ôn tập ngẫu
          nhiên</p>
      </div>
    </div>
    <div
      class="flex items-center gap-2 bg-indigo-50 dark:bg-indigo-900/30 px-4 py-2 rounded-xl border border-indigo-100/50 dark:border-indigo-800/50">
      <span class="material-symbols-outlined text-indigo-500 dark:text-indigo-400 text-xl">style</span>
      <span id="card-progress" class="font-extrabold text-indigo-700 dark:text-indigo-300 text-sm">0 / 0</span>
    </div>
  </nav>

  <!-- Main Flashcard Area -->
  <main class="flex-1 flex flex-col items-center justify-center p-6 w-full max-w-4xl mx-auto relative">

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center">
      <div
        class="size-24 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center mx-auto mb-6 border border-slate-200 dark:border-slate-700">
        <span
          class="material-symbols-outlined text-5xl text-slate-300 dark:text-slate-600">sentiment_dissatisfied</span>
      </div>
      <h2 class="text-2xl font-black text-slate-800 dark:text-white mb-2">Không có thẻ nào!</h2>
      <p class="text-slate-500 dark:text-slate-400 mb-8 max-w-sm mx-auto">Bài học này chưa có từ vựng nào để học
        flashcard. Vui lòng chọn bài học khác.</p>
      <button onclick="window.location.href='index.html'" class="btn-primary mx-auto">
        <span class="material-symbols-outlined">home</span> Quay lại Dashboard
      </button>
    </div>

    <!-- The Card -->
    <div id="flashcard-container"
      class="w-full max-w-md aspect-[3/4] sm:aspect-square perspective-1000 relative z-10 hidden">
      <!-- Inner wrapper for flipping -->
      <div id="flashcard-inner"
        class="w-full h-full relative transition-transform duration-500 transform-style-3d cursor-pointer shadow-2xl rounded-3xl">

        <!-- FRONT -->
        <div
          class="absolute inset-0 w-full h-full backface-hidden glass-card rounded-3xl flex flex-col items-center justify-center p-8 bg-gradient-to-br from-white to-indigo-50/30 dark:from-slate-800 dark:to-indigo-900/10 text-center">
          <div class="absolute top-6 right-6">
            <span
              class="material-symbols-outlined text-indigo-200 dark:text-indigo-800/50 text-4xl opacity-50">touch_app</span>
          </div>
          <h2 id="flashcard-japanese"
            class="text-6xl sm:text-7xl font-black text-slate-900 dark:text-white mb-4 tracking-tighter mix-blend-multiply dark:mix-blend-normal">
            漢字</h2>
          <p
            class="text-sm font-bold text-indigo-400 dark:text-indigo-500 uppercase tracking-widest absolute bottom-8 animate-pulse">
            Chạm để lật thẻ</p>
        </div>

        <!-- BACK -->
        <div
          class="absolute inset-0 w-full h-full backface-hidden glass-card rounded-3xl rotate-y-180 flex flex-col items-center justify-center p-8 bg-gradient-to-bl from-slate-900 via-indigo-950 to-slate-900 text-center border-indigo-500/30 dark:border-indigo-500/50">
          <div class="absolute top-6 left-6">
            <span
              class="text-[10px] font-black uppercase tracking-widest text-indigo-400/50 dark:text-indigo-300 bg-indigo-400/10 dark:bg-indigo-900/30 px-3 py-1.5 rounded-lg border border-indigo-400/20 dark:border-indigo-500/30"
              id="flashcard-type">Từ vựng</span>
          </div>
          <p id="flashcard-hiragana"
            class="text-3xl font-medium text-indigo-200 dark:text-indigo-300 mb-6 drop-shadow-md">かんじ</p>
          <div
            class="w-16 h-1 bg-gradient-to-r from-transparent via-indigo-500 to-transparent mb-6 opacity-30 dark:opacity-50">
          </div>
          <h2 id="flashcard-meaning" class="text-3xl sm:text-4xl font-black text-white px-4 leading-tight">Nghĩa của từ
          </h2>
        </div>

      </div>
    </div>

    <!-- Controls -->
    <div id="flashcard-controls" class="flex items-center gap-4 sm:gap-6 mt-12 w-full max-w-md justify-between hidden">
      <button id="prev-card" class="btn-secondary flex-1 justify-center group">
        <span class="material-symbols-outlined transition-transform group-hover:-translate-x-1">arrow_back</span>
        <span class="hidden sm:inline">Trước</span>
      </button>
      <button id="flip-btn-control"
        class="size-14 rounded-full bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 flex items-center justify-center shadow-inner hover:bg-indigo-200 dark:hover:bg-indigo-800/60 transition-colors shadow-sm border border-indigo-200 dark:border-indigo-700/50 flex-shrink-0 focus:outline-none focus:ring-4 focus:ring-indigo-50 dark:focus:ring-indigo-500/20">
        <span class="material-symbols-outlined text-2xl">sync</span>
      </button>
      <button id="next-card" class="btn-primary flex-1 justify-center group">
        <span class="hidden sm:inline">Tiếp</span>
        <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
      </button>
    </div>

  </main>

  <!-- Global API Loading Overlay -->
  <div id="api-loading-overlay"
    class="fixed inset-0 z-[100] bg-slate-900/20 dark:bg-slate-900/60 backdrop-blur-sm flex items-center justify-center transition-all duration-300"
    style="display: none;">
    <div
      class="bg-white dark:bg-slate-800 p-5 rounded-3xl shadow-2xl border border-white/50 dark:border-slate-700/50 flex flex-col items-center gap-4">
      <div
        class="size-10 border-4 border-indigo-100 dark:border-indigo-900/50 border-t-indigo-600 dark:border-t-indigo-400 rounded-full animate-spin">
      </div>
      <p class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">Đang xử lý...</p>
    </div>
  </div>

</body>

</html>
