<div id="stats-overlay"
  class="fixed inset-0 z-[60] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 transition-all duration-300 hidden opacity-0">
  <div
    class="bg-white/95 dark:bg-slate-800/95 backdrop-blur-2xl border border-white/50 dark:border-slate-700/50 shadow-[0_0_50px_rgba(0,0,0,0.1)] dark:shadow-[0_0_50px_rgba(0,0,0,0.5)] rounded-3xl p-6 md:p-8 max-w-4xl w-full transform transition-all duration-300 scale-95 opacity-0 relative overflow-hidden"
    id="stats-modal-content">
    <!-- Decorative background blur -->
    <div
      class="absolute -top-32 -right-32 size-64 bg-indigo-200/50 dark:bg-indigo-900/40 blur-3xl rounded-full pointer-events-none z-0">
    </div>

    <div class="flex items-center justify-between mb-8 relative z-10">
      <div>
        <h2 class="text-3xl font-black text-slate-800 dark:text-white">Thống kê học tập</h2>
        <p class="text-sm font-medium text-slate-500 dark:text-slate-400 mt-1">Theo dõi tiến độ nắm bắt từ vựng toàn
          cục</p>
      </div>
      <button id="close-stats-btn"
        class="size-10 rounded-full bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 hover:bg-rose-100 dark:hover:bg-rose-900/50 hover:text-rose-600 dark:hover:text-rose-400 flex items-center justify-center transition-colors shadow-sm border border-slate-200 dark:border-slate-600">
        <span class="material-symbols-outlined font-bold">close</span>
      </button>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8 relative z-10">
      <!-- Total -->
      <div
        class="bg-slate-50 dark:bg-slate-700/50 rounded-2xl p-4 border border-slate-200 dark:border-slate-600 shadow-sm text-center">
        <p class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-1">Tổng số từ</p>
        <p id="stats-total-words" class="text-3xl font-black text-slate-800 dark:text-white">0</p>
      </div>
      <!-- Mastered -->
      <div
        class="bg-emerald-50 dark:bg-emerald-900/20 rounded-2xl p-4 border border-emerald-200 dark:border-emerald-700 shadow-sm text-center">
        <p class="text-xs font-bold uppercase tracking-widest text-emerald-600 dark:text-emerald-400 mb-1">Đã thuộc
        </p>
        <p id="stats-mastered-words" class="text-3xl font-black text-emerald-700 dark:text-emerald-300">0</p>
      </div>
      <!-- Learning -->
      <div
        class="bg-amber-50 dark:bg-amber-900/20 rounded-2xl p-4 border border-amber-200 dark:border-amber-700 shadow-sm text-center">
        <p class="text-xs font-bold uppercase tracking-widest text-amber-600 dark:text-amber-400 mb-1">Đang học</p>
        <p id="stats-learning-words" class="text-3xl font-black text-amber-700 dark:text-amber-300">0</p>
      </div>
      <!-- Not Learned -->
      <div
        class="bg-sky-50 dark:bg-sky-900/20 rounded-2xl p-4 border border-sky-200 dark:border-sky-700 shadow-sm text-center">
        <p class="text-xs font-bold uppercase tracking-widest text-sky-600 dark:text-sky-400 mb-1">Chưa học</p>
        <p id="stats-not-learned-words" class="text-3xl font-black text-sky-700 dark:text-sky-300">0</p>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 relative z-10 h-72">
      <div
        class="bg-white dark:bg-slate-800/50 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-inner p-4 flex flex-col items-center justify-center h-full relative">
        <h3 class="text-sm font-bold text-slate-500 dark:text-slate-400 absolute top-4 left-4 z-10">Tỷ lệ nắm vững
        </h3>
        <div class="w-full h-full pb-2 pt-6 flex items-center justify-center relative">
          <canvas id="learning-progress-chart" class="max-h-full"></canvas>
        </div>
      </div>
      <div
        class="bg-white dark:bg-slate-800/50 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-inner p-4 flex flex-col items-center justify-center h-full relative">
        <h3 class="text-sm font-bold text-slate-500 dark:text-slate-400 absolute top-4 left-4">Dữ liệu đánh giá (Mô
          phỏng)</h3>
        <div class="flex-1 flex flex-col items-center justify-center w-full h-full text-center p-6 mt-4">
          <span class="material-symbols-outlined text-5xl text-slate-200 dark:text-slate-600 mb-2">query_stats</span>
          <p class="text-slate-400 dark:text-slate-500 font-medium text-sm">Chưa có đủ điểm dữ liệu lịch sử bài kiểm
            tra để vẽ biểu đồ. Hãy làm bài Test thường xuyên hơn nhé!</p>
        </div>
      </div>
    </div>
  </div>
</div>
