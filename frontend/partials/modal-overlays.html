<div id="api-loading-overlay"
  class="fixed inset-0 z-[100] bg-slate-900/20 dark:bg-slate-900/60 backdrop-blur-sm flex items-center justify-center transition-all duration-300"
  style="display: none;">
  <div
    class="bg-white dark:bg-slate-800 p-5 rounded-3xl shadow-2xl border border-white/50 dark:border-slate-700/50 flex flex-col items-center gap-4">
    <div class="relative flex items-center justify-center">
      <div class="absolute w-12 h-12 rounded-full border-4 border-slate-100 dark:border-slate-700"></div>
      <div class="absolute w-12 h-12 rounded-full border-4 border-indigo-500 border-t-transparent animate-spin"></div>
      <span class="material-symbols-outlined text-indigo-500 absolute">cloud_sync</span>
    </div>
    <p class="text-sm font-bold text-slate-600 dark:text-slate-300">Đang đồng bộ...</p>
  </div>
</div>

<!-- Word Detail Modal -->
<div id="word-detail-modal"
  class="fixed inset-0 z-[110] bg-slate-900/40 dark:bg-slate-900/80 backdrop-blur-sm flex items-center justify-center transition-all duration-300 pointer-events-none opacity-0">
  <div
    class="bg-white/95 dark:bg-slate-800/95 backdrop-blur-2xl border border-white/50 dark:border-slate-700/50 shadow-[0_20px_60px_rgba(0,0,0,0.15)] dark:shadow-[0_20px_60px_rgba(0,0,0,0.5)] rounded-3xl w-full max-w-sm transform transition-all duration-300 scale-95 opacity-0 relative overflow-hidden"
    id="word-detail-content">

    <!-- Decorative background blur -->
    <div
      class="absolute -top-24 -right-24 size-48 bg-indigo-200/50 dark:bg-indigo-900/40 blur-3xl rounded-full pointer-events-none z-0">
    </div>

    <!-- Header -->
    <div
      class="px-6 py-6 border-b border-slate-100 dark:border-slate-700/60 relative z-10 flex justify-between items-start">
      <div>
        <h3 id="detail-japanese" class="text-4xl font-black text-slate-900 dark:text-white mb-1 tracking-tight"></h3>
        <p id="detail-hiragana" class="text-lg font-medium text-indigo-500 dark:text-indigo-400"></p>
      </div>
      <button id="close-detail-modal"
        class="size-8 rounded-full bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-500 dark:text-slate-400 flex items-center justify-center transition-colors">
        <span class="material-symbols-outlined text-lg">close</span>
      </button>
    </div>

    <!-- Body -->
    <div class="px-6 py-6 relative z-10 space-y-4 flex flex-col items-center text-center">
      <div class="w-full">
        <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-1">Nghĩa
          tiếng Việt</p>
        <p id="detail-meaning" class="text-xl font-bold text-slate-800 dark:text-slate-200"></p>
      </div>
      <div class="w-full h-px bg-gradient-to-r from-transparent via-slate-200 dark:via-slate-700 to-transparent my-2">
      </div>
      <div class="flex gap-4 w-full">
        <div class="flex-1">
          <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-1">Loại từ
          </p>
          <p id="detail-type"
            class="text-sm font-semibold text-slate-700 dark:text-slate-300 bg-slate-100 dark:bg-slate-700/50 inline-block px-3 py-1 rounded-lg">
          </p>
        </div>
        <div class="flex-1">
          <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-1">Bài học
          </p>
          <p id="detail-lesson"
            class="text-sm font-semibold text-slate-700 dark:text-slate-300 bg-slate-100 dark:bg-slate-700/50 inline-block px-3 py-1 rounded-lg">
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Auth CTA Popup -->
<div id="auth-cta-popup"
  class="fixed bottom-6 right-6 z-[80] bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border border-indigo-100 dark:border-indigo-900 p-5 max-w-sm transform transition-all duration-500 translate-y-24 opacity-0 pointer-events-none hidden flex-col gap-3">
  <button id="close-cta-btn"
    class="absolute top-3 right-3 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
    <span class="material-symbols-outlined text-sm font-bold">close</span>
  </button>
  <div class="flex items-start gap-4">
    <div
      class="size-10 rounded-full bg-indigo-100 dark:bg-indigo-900/50 flex items-center justify-center text-indigo-600 dark:text-indigo-400 shrink-0">
      <span class="material-symbols-outlined font-bold">auto_awesome</span>
    </div>
    <div>
      <h4 class="text-sm font-bold text-slate-800 dark:text-slate-100 mb-1">Mở khóa tính năng</h4>
      <p class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">Đăng nhập để trải nghiệm thêm nhiều tính
        năng hấp dẫn!</p>
    </div>
  </div>
  <button id="cta-login-btn"
    class="w-full mt-2 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold rounded-xl shadow-md transition-colors flex items-center justify-center gap-2">
    Đăng nhập ngay
  </button>
</div>

<!-- Auth Modal (Login / Register) -->
<div id="auth-modal-overlay"
  class="fixed inset-0 z-[120] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 transition-all duration-300 hidden opacity-0">
  <div
    class="bg-white/95 dark:bg-slate-800/95 backdrop-blur-2xl border border-white/50 dark:border-slate-700/50 shadow-2xl rounded-3xl w-full max-w-md transform transition-all duration-300 scale-95 opacity-0 relative overflow-hidden"
    id="auth-modal-content">
    <button id="close-auth-modal"
      class="absolute top-4 right-4 size-8 rounded-full bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-500 dark:text-slate-400 flex items-center justify-center transition-colors z-20">
      <span class="material-symbols-outlined text-sm font-bold">close</span>
    </button>

    <!-- Decorative Blur -->
    <div
      class="absolute -top-20 -left-20 size-40 bg-indigo-300/40 dark:bg-indigo-600/30 blur-3xl rounded-full pointer-events-none z-0">
    </div>

    <div class="p-6 md:p-8 relative z-10">
      <div class="text-center mb-8">
        <div
          class="size-12 rounded-2xl bg-gradient-to-tr from-indigo-600 to-indigo-400 flex items-center justify-center mx-auto mb-4 shadow-lg">
          <span class="text-white font-black text-2xl italic">J</span>
        </div>
        <h2 class="text-2xl font-black text-slate-800 dark:text-white" id="auth-modal-title">Chào mừng trở lại</h2>
        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1" id="auth-modal-subtitle">Đăng nhập để lưu trữ tiến
          độ học tập</p>
      </div>

      <!-- Auth Tabs (Login/Register) -->
      <div class="flex bg-slate-100 dark:bg-slate-900/50 rounded-xl p-1 mb-6 relative">
        <div id="auth-tab-indicator"
          class="absolute inset-y-1 left-1 w-[calc(50%-4px)] bg-white dark:bg-slate-700 rounded-lg shadow-sm transition-transform duration-300 ease-out z-0">
        </div>
        <button id="tab-login"
          class="flex-1 py-2 text-sm font-bold text-slate-800 dark:text-slate-100 z-10 transition-colors">Đăng
          nhập</button>
        <button id="tab-register"
          class="flex-1 py-2 text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300 z-10 transition-colors">Đăng
          ký</button>
      </div>

      <!-- Forms -->
      <form id="auth-form" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-700 dark:text-slate-300 mb-1.5 ml-1">Tên đăng nhập /
            Email</label>
          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">person</span>
            <input type="text" id="auth-username" required
              class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400"
              placeholder="Nhập tên tài khoản" />
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 dark:text-slate-300 mb-1.5 ml-1">Mật khẩu</label>
          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock</span>
            <input type="password" id="auth-password" required
              class="w-full pl-10 pr-10 py-3 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400"
              placeholder="••••••••" />
            <button type="button"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 focus:outline-none">
              <span class="material-symbols-outlined text-lg" id="toggle-password-visibility">visibility_off</span>
            </button>
          </div>
        </div>

        <div id="register-fields" class="hidden space-y-4 pt-1">
          <div>
            <label class="block text-xs font-bold text-slate-700 dark:text-slate-300 mb-1.5 ml-1">Xác nhận mật
              khẩu</label>
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">password</span>
              <input type="password" id="auth-confirm-password"
                class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400"
                placeholder="••••••••" />
            </div>
          </div>
        </div>

        <button type="submit" id="auth-submit-btn"
          class="w-full mt-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold rounded-xl shadow-lg shadow-indigo-600/20 transition-all flex items-center justify-center gap-2 group">
          <span id="auth-submit-text">Đăng nhập</span>
          <span
            class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
        </button>
      </form>

    </div>
  </div>
</div>
