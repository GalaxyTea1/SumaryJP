<div id="view-flashcard"
  class="hidden view-container fixed inset-0 z-[60] bg-off-white dark:bg-slate-900 flex flex-col"
  style="transition: opacity 0.2s ease;">
  <nav
    class="w-full px-6 py-4 flex items-center justify-between bg-white/50 dark:bg-slate-900/50 backdrop-blur-md border-b border-white/50 dark:border-slate-800/50 sticky top-0 z-50">
    <div class="flex items-center gap-4">
      <button id="fc-exit"
        class="size-10 rounded-xl bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 shadow-sm border border-slate-200 dark:border-slate-700 flex items-center justify-center hover:text-rose-500 dark:hover:text-rose-400 hover:border-rose-200 dark:hover:border-rose-800/50 hover:bg-rose-50 dark:hover:bg-rose-900/30 transition-all">
        <span class="material-symbols-outlined font-bold">close</span>
      </button>
      <div>
        <h1 class="font-black text-xl text-slate-800 dark:text-white" id="fc-header-title">Flashcards</h1>
        <p class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mt-0.5">Ôn tập ngẫu
          nhiên</p>
      </div>
    </div>
    <div
      class="flex items-center gap-2 bg-indigo-50 dark:bg-indigo-900/30 px-4 py-2 rounded-xl border border-indigo-100/50 dark:border-indigo-800/50">
      <span class="material-symbols-outlined text-indigo-500 dark:text-indigo-400 text-xl">style</span>
      <span id="fc-progress" class="font-extrabold text-indigo-700 dark:text-indigo-300 text-sm">0 / 0</span>
    </div>
  </nav>
  <main class="flex-1 flex flex-col items-center justify-center p-6 w-full max-w-4xl mx-auto relative">
    <div id="fc-empty-state" class="hidden text-center">
      <div
        class="size-24 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center mx-auto mb-6 border border-slate-200 dark:border-slate-700">
        <span
          class="material-symbols-outlined text-5xl text-slate-300 dark:text-slate-600">sentiment_dissatisfied</span>
      </div>
      <h2 class="text-2xl font-black text-slate-800 dark:text-white mb-2">Không có thẻ nào!</h2>
      <p class="text-slate-500 dark:text-slate-400 mb-8 max-w-sm mx-auto">Bài học này chưa có từ vựng nào để học
        flashcard.</p>
      <button onclick="import('./components/viewManager.js').then(m=>m.viewManager.back())"
        class="bg-indigo-600 text-white font-bold py-3 px-6 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all active:scale-95 flex items-center gap-2 mx-auto">
        <span class="material-symbols-outlined">home</span> Quay lại Dashboard
      </button>
    </div>
    <div id="fc-card-container"
      class="w-full max-w-md aspect-[3/4] sm:aspect-square perspective-1000 relative z-10 hidden">
      <div id="fc-inner"
        class="w-full h-full relative transition-transform duration-500 transform-style-3d cursor-pointer shadow-2xl rounded-3xl">
        <div
          class="absolute inset-0 w-full h-full backface-hidden bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl border border-white dark:border-slate-700 shadow-2xl rounded-3xl flex flex-col items-center justify-center p-8 bg-gradient-to-br from-white to-indigo-50/30 dark:from-slate-800 dark:to-indigo-900/10 text-center">
          <div class="absolute top-6 right-6"><span
              class="material-symbols-outlined text-indigo-200 dark:text-indigo-800/50 text-4xl opacity-50">touch_app</span>
          </div>
          <h2 id="fc-japanese"
            class="text-6xl sm:text-7xl font-black text-slate-900 dark:text-white mb-4 tracking-tighter">漢字</h2>
          <p
            class="text-sm font-bold text-indigo-400 dark:text-indigo-500 uppercase tracking-widest absolute bottom-8 animate-pulse">
            Chạm để lật thẻ</p>
        </div>
        <div
          class="absolute inset-0 w-full h-full backface-hidden bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl border border-indigo-500/30 dark:border-indigo-500/50 shadow-2xl rounded-3xl rotate-y-180 flex flex-col items-center justify-center p-8 bg-gradient-to-bl from-slate-900 via-indigo-950 to-slate-900 text-center">
          <div class="absolute top-6 left-6"><span
              class="text-[10px] font-black uppercase tracking-widest text-indigo-400/50 dark:text-indigo-300 bg-indigo-400/10 dark:bg-indigo-900/30 px-3 py-1.5 rounded-lg border border-indigo-400/20 dark:border-indigo-500/30"
              id="fc-type">Từ vựng</span></div>
          <p id="fc-hiragana" class="text-3xl font-medium text-indigo-200 dark:text-indigo-300 mb-6 drop-shadow-md">
            かんじ</p>
          <div
            class="w-16 h-1 bg-gradient-to-r from-transparent via-indigo-500 to-transparent mb-6 opacity-30 dark:opacity-50">
          </div>
          <h2 id="fc-meaning" class="text-3xl sm:text-4xl font-black text-white px-4 leading-tight">Nghĩa của từ</h2>
        </div>
      </div>
    </div>
    <div id="fc-controls" class="flex items-center gap-4 sm:gap-6 mt-12 w-full max-w-md justify-between hidden">
      <button id="fc-prev"
        class="bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-bold py-3 px-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 hover:border-indigo-300 dark:hover:border-indigo-500 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all active:scale-95 flex items-center gap-2 flex-1 justify-center group">
        <span class="material-symbols-outlined transition-transform group-hover:-translate-x-1">arrow_back</span>
        <span class="hidden sm:inline">Trước</span>
      </button>
      <button id="fc-flip-btn"
        class="size-14 rounded-full bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 flex items-center justify-center shadow-sm border border-indigo-200 dark:border-indigo-700/50 flex-shrink-0 hover:bg-indigo-200 dark:hover:bg-indigo-800/60 transition-colors focus:outline-none focus:ring-4 focus:ring-indigo-50 dark:focus:ring-indigo-500/20">
        <span class="material-symbols-outlined text-2xl">sync</span>
      </button>
      <button id="fc-next"
        class="bg-indigo-600 text-white font-bold py-3 px-6 rounded-2xl shadow-lg shadow-indigo-200 dark:shadow-indigo-900/50 hover:bg-indigo-700 hover:shadow-xl transition-all active:scale-95 flex items-center gap-2 flex-1 justify-center group">
        <span class="hidden sm:inline">Tiếp</span>
        <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
      </button>
    </div>
  </main>
</div>
