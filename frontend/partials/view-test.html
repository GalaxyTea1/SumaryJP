<div id="view-test"
  class="hidden view-container fixed inset-0 z-[60] bg-off-white dark:bg-slate-900 flex flex-col overflow-y-auto"
  style="transition: opacity 0.2s ease;">
  <nav id="ts-header"
    class="w-full px-4 sm:px-6 py-4 flex flex-wrap items-center justify-between bg-white/50 dark:bg-slate-900/50 backdrop-blur-md border-b border-white/50 dark:border-slate-800/50 sticky top-0 z-40">
    <div class="flex items-center gap-3 mb-2 sm:mb-0">
      <button id="ts-quit-btn"
        class="size-10 rounded-xl bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 shadow-sm border border-slate-200 dark:border-slate-700 flex items-center justify-center hover:text-rose-500 hover:border-rose-200 hover:bg-rose-50 dark:hover:bg-rose-900/40 transition-all"
        title="Thoát">
        <span class="material-symbols-outlined font-bold">close</span>
      </button>
      <div class="hidden sm:block">
        <h1 class="font-black text-xl text-slate-800 dark:text-white">Kiểm tra từ vựng</h1>
      </div>
    </div>
    <div class="flex items-center gap-3 sm:gap-6 w-full sm:w-auto overflow-x-auto justify-end">
      <div
        class="flex items-center gap-2 bg-rose-50 dark:bg-rose-900/30 px-4 py-2 rounded-xl border border-rose-100 dark:border-rose-800/50 flex-shrink-0">
        <span class="material-symbols-outlined text-rose-500 dark:text-rose-400 text-xl animate-pulse">timer</span>
        <span id="ts-timer"
          class="font-black text-rose-700 dark:text-rose-300 font-mono tracking-wider tabular-nums">00:00</span>
      </div>
      <div
        class="flex items-center gap-2 bg-indigo-50 dark:bg-indigo-900/30 px-4 py-2 rounded-xl border border-indigo-100/50 dark:border-indigo-800/50 flex-shrink-0">
        <span class="material-symbols-outlined text-indigo-500 dark:text-indigo-400 text-xl">assignment</span>
        <span id="ts-progress" class="font-extrabold text-indigo-700 dark:text-indigo-300 text-sm">Câu: 1/10</span>
      </div>
    </div>
    <div class="w-full bg-slate-200 dark:bg-slate-700 h-1.5 absolute bottom-0 left-0">
      <div id="ts-progress-bar" class="bg-indigo-500 h-full transition-all duration-300" style="width: 0%"></div>
    </div>
  </nav>
  <main id="ts-main"
    class="flex-1 flex flex-col items-center justify-start p-4 sm:p-6 w-full max-w-3xl mx-auto relative pt-8 sm:pt-12">
    <div
      class="w-full bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl border border-white dark:border-slate-700 shadow-xl rounded-3xl p-6 md:p-10 text-center mb-8 relative">
      <span
        class="absolute -top-5 left-1/2 -translate-x-1/2 bg-indigo-600 text-white text-xs font-black uppercase tracking-widest py-1.5 px-4 rounded-full shadow-md z-10"
        id="ts-question-label">Câu hỏi số 1</span>
      <h2 id="ts-word"
        class="text-5xl sm:text-7xl font-black text-slate-900 dark:text-white mb-3 tracking-tighter mt-4">漢字</h2>
      <p id="ts-hint" class="text-lg font-bold text-slate-400 dark:text-slate-500 min-h-[28px]">hiragana</p>
    </div>
    <div id="ts-options" class="w-full space-y-3"></div>
    <div class="w-full flex items-center justify-between mt-8 gap-3">
      <button id="ts-prev-btn"
        class="bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-bold py-3.5 px-5 rounded-2xl shadow-sm border-2 border-slate-200 dark:border-slate-700 hover:border-indigo-400 dark:hover:border-indigo-500 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all active:scale-95 flex items-center justify-center gap-2 disabled:opacity-30 disabled:cursor-not-allowed disabled:hover:bg-white disabled:hover:border-slate-200 disabled:hover:text-slate-600"
        disabled title="Quay lại câu trước">
        <span class="material-symbols-outlined">arrow_back</span>
        <span class="hidden sm:inline">Câu trước</span>
      </button>

      <div
        class="flex items-center gap-2 bg-slate-100 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 rounded-2xl px-3 py-2"
        title="Nhảy đến câu bất kỳ">
        <span class="material-symbols-outlined text-slate-400 dark:text-slate-500 text-lg">pin</span>
        <input id="ts-jump-input" type="number" min="1" placeholder="#"
          class="w-12 bg-transparent text-center font-black text-slate-700 dark:text-slate-200 text-sm focus:outline-none placeholder-slate-400 dark:placeholder-slate-600 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" />
        <button id="ts-jump-btn"
          class="text-xs font-bold text-indigo-600 dark:text-indigo-400 bg-indigo-100 dark:bg-indigo-900/40 hover:bg-indigo-200 dark:hover:bg-indigo-800/60 px-2 py-1 rounded-xl transition-colors"
          title="Đi đến câu">
          Đến
        </button>
      </div>

      <button id="ts-next-btn"
        class="bg-indigo-600 text-white font-bold py-3.5 px-5 sm:px-6 rounded-2xl shadow-lg shadow-indigo-200 dark:shadow-indigo-900/40 hover:bg-indigo-700 hover:shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2"
        disabled>
        <span class="hidden sm:inline">Câu tiếp theo</span>
        <span class="sm:hidden">Tiếp</span>
        <span class="material-symbols-outlined">arrow_forward</span>
      </button>
    </div>
  </main>
  <main id="ts-results"
    class="flex-1 flex flex-col items-center justify-start p-4 sm:p-6 w-full max-w-4xl mx-auto relative hidden pb-20">
    <div
      class="w-full bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl border border-white dark:border-slate-700 shadow-xl rounded-3xl p-6 md:p-10 text-center mb-10 overflow-hidden relative">
      <div
        class="absolute -top-24 -right-24 size-64 bg-emerald-300/20 dark:bg-emerald-900/20 rounded-full blur-3xl pointer-events-none">
      </div>
      <div
        class="size-20 bg-emerald-100 dark:bg-emerald-900/40 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-white dark:border-slate-800 shadow-lg relative z-10">
        <span class="material-symbols-outlined text-4xl text-emerald-500 font-bold">emoji_events</span>
      </div>
      <h1 class="text-3xl sm:text-4xl font-black text-slate-800 dark:text-white mb-2 relative z-10">Hoàn thành bài
        kiểm tra!</h1>
      <p class="text-slate-500 dark:text-slate-400 font-medium relative z-10">Kết quả của bạn đã được ghi nhận.</p>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-8 relative z-10">
        <div
          class="bg-indigo-50/50 dark:bg-indigo-900/20 rounded-2xl p-4 border border-indigo-100 dark:border-indigo-800">
          <p class="text-xs font-bold uppercase tracking-widest text-indigo-400 mb-1">Điểm số</p>
          <p class="text-3xl font-black text-indigo-600 dark:text-indigo-400"><span id="ts-final-score">100</span>%
          </p>
        </div>
        <div class="bg-slate-50 dark:bg-slate-800/50 rounded-2xl p-4 border border-slate-200 dark:border-slate-700">
          <p class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-1">Thời gian</p>
          <p class="text-2xl mt-1 font-black text-slate-700 dark:text-slate-300 font-mono tracking-tight"
            id="ts-time-taken">02:30</p>
        </div>
        <div
          class="bg-emerald-50/50 dark:bg-emerald-900/20 rounded-2xl p-4 border border-emerald-100 dark:border-emerald-800">
          <p class="text-xs font-bold uppercase tracking-widest text-emerald-500 mb-1">Làm đúng</p>
          <div
            class="flex items-center justify-center gap-1.5 mt-1 text-emerald-600 dark:text-emerald-400 font-black text-2xl">
            <span class="material-symbols-outlined">check_circle</span>
            <span id="ts-correct-count">8</span>
          </div>
        </div>
        <div class="bg-rose-50/50 dark:bg-rose-900/20 rounded-2xl p-4 border border-rose-100 dark:border-rose-800">
          <p class="text-xs font-bold uppercase tracking-widest text-rose-500 mb-1">Làm sai</p>
          <div
            class="flex items-center justify-center gap-1.5 mt-1 text-rose-600 dark:text-rose-400 font-black text-2xl">
            <span class="material-symbols-outlined">cancel</span>
            <span id="ts-wrong-count">2</span>
          </div>
        </div>
      </div>
    </div>
    <div class="w-full text-left">
      <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-6 flex items-center gap-2">
        <span class="material-symbols-outlined text-slate-400">format_list_bulleted</span> Chi tiết bài làm
      </h3>
      <div id="ts-answers-list"></div>
    </div>
    <div class="mt-12 flex justify-center">
      <button id="ts-back-btn"
        class="bg-indigo-600 text-white font-bold py-3.5 px-6 rounded-2xl shadow-lg shadow-indigo-200 dark:shadow-indigo-900/40 hover:bg-indigo-700 hover:shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2 px-10">
        <span class="material-symbols-outlined">home</span> Quay về màn hình chính
      </button>
    </div>
  </main>
</div>
